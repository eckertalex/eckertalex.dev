<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>
            {{ block "title" . }}{{ .Frontmatter.Title }} · {{ .Site.Name }}{{
            end }}
        </title>
        <meta
            name="description"
            content="{{ or .Frontmatter.Description .Site.Description }}"
        />
        <meta name="author" content="{{ .Site.Author }}" />
        <link rel="canonical" href="{{ .Site.URL }}{{ .CanonicalPath }}" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="sitemap" href="/sitemap.xml" />
        <link
            rel="alternate"
            type="application/atom+xml"
            title="{{ .Site.Name }}'s Blog"
            href="/atom.xml"
        />

        <meta
            name="theme-color"
            media="(prefers-color-scheme: light)"
            content="#f8fafc"
        />
        <meta
            name="theme-color"
            media="(prefers-color-scheme: dark)"
            content="#020617"
        />

        <meta
            property="og:type"
            content="{{ if .IsPost }}article{{ else }}website{{ end }}"
        />
        <meta property="og:title" content="{{ .Frontmatter.Title }}" />
        <meta
            property="og:description"
            content="{{ or .Frontmatter.Description .Site.Description }}"
        />
        <meta property="og:image" content="{{ absURL .Site.OGImage }}" />
        <meta property="og:image:alt" content="{{ .Site.OGImageAlt }}" />
        <meta property="og:url" content="{{ .Site.URL }}{{ .CanonicalPath }}" />
        <meta property="og:site_name" content="{{ .Site.Name }}" />
        <meta property="og:locale" content="{{ .Site.Locale }}" />
        {{ if .IsPost }}
        <meta
            property="article:published_time"
            content="{{ rfc3339 .Frontmatter.Published }}"
        />
        {{ if .Frontmatter.Updated }}
        <meta
            property="article:modified_time"
            content="{{ rfc3339 .Frontmatter.Updated }}"
        />
        {{ end }}
        <meta property="article:author" content="{{ .Site.Author }}" />
        {{ end }}

        <meta name="twitter:card" content="summary_large_image" />
        {{ if .Site.Socials.X }}<meta name="twitter:site" content="@{{ .Site.Socials.X }}" />{{ end }}
        <meta name="twitter:title" content="{{ .Frontmatter.Title }}" />
        <meta
            name="twitter:description"
            content="{{ or .Frontmatter.Description .Site.Description }}"
        />
        <meta name="twitter:image" content="{{ absURL .Site.OGImage }}" />
        <meta name="twitter:image:alt" content="{{ .Site.OGImageAlt }}" />

        <script>
            (function () {
                var t = localStorage.getItem("theme");
                if (
                    t === "dark" ||
                    (!t && matchMedia("(prefers-color-scheme: dark)").matches)
                ) {
                    document.documentElement.dataset.theme = "dark";
                } else if (t === "light") {
                    document.documentElement.dataset.theme = "light";
                }
            })();
        </script>

        <link rel="stylesheet" href="/syntax.css" />
        <link rel="stylesheet" href="/styles.css" />
        {{ if and .Prod .Site.UmamiID }}
        <script defer src="{{ .Site.UmamiSrc }}" data-website-id="{{ .Site.UmamiID }}"></script>
        {{ end }}
    </head>
    <body>
        {{ template "nav" . }}
        <main id="skip">{{ template "content" . }}</main>
        {{ template "footer" . }}

        <script>
            document
                .getElementById("theme-toggle")
                ?.addEventListener("click", function () {
                    var next =
                        document.documentElement.dataset.theme === "dark"
                            ? "light"
                            : "dark";
                    document.documentElement.dataset.theme = next;
                    localStorage.setItem("theme", next);
                });

            (function () {
                var btn = document.getElementById("menu-toggle");
                var menu = document.getElementById("mobile-menu");
                if (!btn || !menu) return;

                function setOpen(open) {
                    if (open) {
                        menu.removeAttribute("hidden");
                    } else {
                        menu.setAttribute("hidden", "");
                    }
                    btn.setAttribute("aria-expanded", open ? "true" : "false");
                }

                btn.addEventListener("click", function (e) {
                    e.stopPropagation();
                    setOpen(menu.hasAttribute("hidden"));
                });

                document.addEventListener("click", function (e) {
                    if (!menu.hasAttribute("hidden") && !menu.contains(e.target)) {
                        setOpen(false);
                    }
                });

                document.addEventListener("keydown", function (e) {
                    if (e.key === "Escape") setOpen(false);
                });
            })();
        </script>
    </body>
</html>
